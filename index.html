*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:#0a0a0a;color:#e0e0e0;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
::selection{background:#4AE06A;color:#000;}

.mono{font-family:'Space Mono',monospace;}
.green{color:#4AE06A;}

/* Scrollbar */

.marquee{display:flex;gap:48px;animation:scroll 18s linear infinite;white-space:nowrap;font-size:12px;color:#4AE06A;text-transform:uppercase;letter-spacing:3px;font-weight:700;}
